services:
    nextjs:
        image: nextjs-app:latest
        container_name: nextjs-app
        restart: unless-stopped
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=production
            # Add other env vars here
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

networks:
    app-network:
        driver: bridge
