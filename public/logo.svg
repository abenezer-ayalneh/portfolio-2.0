<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abenezer Ayalneh logo">
  <!-- Amber-CRT terminal chip: warm near-black base, amber accent. See CONTEXT.md. -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#15100C" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="none" stroke="#F97A24" stroke-opacity="0.28" stroke-width="1.5" />

  <!-- Geometric "A" monogram, amber two-tone (echoes the original split mark). -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left leg: lighter amber highlight -->
    <line x1="32" y1="15" x2="18" y2="49" stroke="#FFB066" stroke-width="6.5" />
    <!-- right leg: primary amber -->
    <line x1="32" y1="15" x2="46" y2="49" stroke="#F97A24" stroke-width="6.5" />
    <!-- crossbar -->
    <line x1="23.5" y1="38" x2="40.5" y2="38" stroke="#F97A24" stroke-width="5.5" />
  </g>

  <!-- Terminal cursor block — the CRT/terminal motif from the navbar (~/abenezer_). -->
  <rect x="46" y="44" width="7" height="5" rx="1" fill="#F97A24" />
</svg>
